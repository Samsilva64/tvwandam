services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: tvwandam
      MYSQL_USER: tvwandam
      MYSQL_PASSWORD: tvwandam
      MYSQL_ROOT_PASSWORD: tvwandam_root
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql

volumes:
  mysqldata:
